services:
  postgres:
    image: postgres:16
    container_name: bettracker-db
    environment:
      POSTGRES_DB: bettracker
      POSTGRES_USER: bettracker
      POSTGRES_PASSWORD: bettracker123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: