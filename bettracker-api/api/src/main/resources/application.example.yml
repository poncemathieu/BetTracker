spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bettracker
    username: DB_USER
    password: DB_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

jwt:
  secret: JWT_SECRET
  expiration: 604800000 # 7 jours